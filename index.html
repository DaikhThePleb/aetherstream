<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AetherStream</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0f0f0f;
      }

      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f0f0f;
        z-index: 200000;
        opacity: 1;
        transition: opacity 200ms ease;
        font-size: 17px;
        font-weight: 800;
        text-align: center;
      }

      #boot-loader.boot-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 10px;
        min-width: 280px;
        max-width: 560px;
      }

      .boot-logo {
        width: 64px;
        height: 64px;
        animation: boot-pulse 2.1s ease-in-out infinite;
      }

      .boot-spinner {
        width: 200px;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
        position: relative;
      }

      .boot-spinner::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 42%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #00b4ff 0%, #7c3aed 100%);
        animation: boot-loading 1.35s ease-in-out infinite;
      }

      .boot-text {
        min-height: 1.25em;
        width: min(460px, calc(100vw - 72px));
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #e5e7eb;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.25;
        letter-spacing: 0.01em;
        text-shadow: 0 1px 0 rgba(0, 0, 0, 0.3);
      }

      .boot-error {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        margin-top: 2px;
        width: 100%;
      }

      #boot-loader.boot-error .boot-spinner,
      #boot-loader.boot-error .boot-text {
        display: none;
      }

      #boot-loader.boot-error .boot-error {
        display: flex;
      }

      .boot-error-notice {
        width: min(520px, calc(100vw - 72px));
        color: #f9fafb;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        font-size: 16px;
        font-weight: 800;
        line-height: 1.35;
        text-align: center;
      }

      .boot-error-console-wrap {
        position: relative;
        width: min(520px, calc(100vw - 72px));
      }

      .boot-error-console {
        width: 100%;
        margin: 0;
        color: #fca5a5;
        background: #0b0f16;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-left: 4px solid rgba(239, 68, 68, 0.78);
        border-radius: 10px;
        padding: 12px 44px 12px 12px;
        box-sizing: border-box;
        font-family: Consolas, Monaco, monospace;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
        text-align: left;
      }

      .boot-copy-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 28px;
        height: 28px;
        min-width: 28px;
        margin: 0;
        padding: 0;
        border: 1px solid rgba(148, 163, 184, 0.38);
        border-radius: 7px;
        background: rgba(15, 23, 42, 0.92);
        color: #d1d5db;
        font-size: 16px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: filter 0.2s ease, transform 0.2s ease;
      }

      .boot-copy-btn:hover {
        filter: brightness(1.18);
        transform: translateY(-1px);
      }

      .boot-copy-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .boot-exit-btn {
        width: min(420px, calc(100vw - 72px));
        border: 1px solid #991b1b;
        border-radius: 10px;
        padding: 9px 14px;
        min-width: 188px;
        background: #dc2626;
        color: #fff;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
        transition: filter 0.2s ease;
        margin-top: 4px;
      }

      .boot-exit-btn:hover {
        filter: brightness(1.08);
      }

      .boot-exit-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      @keyframes boot-pulse {
        0%,
        100% {
          transform: scale(1);
          filter: drop-shadow(0 0 8px rgba(0, 180, 255, 0.25));
        }

        50% {
          transform: scale(0.96);
          filter: drop-shadow(0 0 16px rgba(128, 0, 255, 0.4));
        }
      }

      @keyframes boot-loading {
        0% {
          transform: translateX(-130%);
        }

        55% {
          transform: translateX(80%);
        }

        100% {
          transform: translateX(240%);
        }
      }
    </style>
  </head>

        <div id="boot-error" class="boot-error" hidden>
          <div id="boot-error-notice" class="boot-error-notice"></div>
          <div class="boot-error-console-wrap">
            <pre id="boot-error-console" class="boot-error-console"></pre>
            <button id="boot-copy-btn" class="boot-copy-btn" type="button" aria-label="Copy error" title="Copy error"></button>

    <script>
      (function applyInitialBootTexts() {
        var savedLang = ''
        try {
          savedLang = String(window.localStorage.getItem('aether_app_lang') || '').trim().toLowerCase()
        } catch (error) {
          savedLang = ''
        }

        var navLang = String((navigator && navigator.language) || 'en').toLowerCase()
        var lang = savedLang || navLang

        if (lang.indexOf('hu') === 0) lang = 'hu'
        else if (lang.indexOf('de') === 0) lang = 'de'
        else if (lang.indexOf('es') === 0) lang = 'es'
        else if (lang.indexOf('fr') === 0) lang = 'fr'
        else lang = 'en'

        var loadingText = {
          en: 'Initializing modules...',
          hu: 'Modulok inicializálása...',
          de: 'Module werden initialisiert...',
          es: 'Inicializando modulos...',
          fr: 'Initialisation des modules...',
        }

        var rotatingCaptions = {
          en: [
            'Syncing Twitch identity and reward mapping...',
            'Building voice routing matrix for TTS rules...',
            'Loading Azure voice catalog and locale filters...',
            'Preparing live log pipeline and badge resolver...',
            'Warming up queue controls and playback state...',
            'Applying overlay status labels for OBS output...',
            'Hardening moderation filters and anti-link checks...',
          ],
          hu: [
            'Twitch azonosítás és jutalomtérkép szinkronizálása...',
            'TTS hangsáv-routing mátrix felépítése...',
            'Azure hangkatalógus és nyelvi szűrők betöltése...',
            'Élő naplófolyam és badge-feloldó előkészítése...',
            'Lejátszási sorvezérlés és állapot melegítése...',
            'OBS overlay státuszfeliratok alkalmazása...',
            'Moderációs szűrők és linkblokkolás élesítése...',
          ],
          de: [
            'Twitch-Identitaet und Belohnungszuordnung werden synchronisiert...',
            'Stimmzuordnung fuer TTS-Regeln wird aufgebaut...',
            'Azure-Stimmenkatalog und Sprachfilter werden geladen...',
            'Live-Log-Pipeline und Badge-Aufloesung werden vorbereitet...',
            'Warteschlangensteuerung und Wiedergabestatus werden vorgewaermt...',
            'Overlay-Statuslabels fuer OBS werden angewendet...',
            'Moderationsfilter und Link-Blockierung werden gehaertet...',
          ],
          es: [
            'Sincronizando identidad de Twitch y mapeo de recompensas...',
            'Construyendo matriz de ruteo de voz para reglas TTS...',
            'Cargando catalogo de voces de Azure y filtros de idioma...',
            'Preparando pipeline de log en vivo y resolvedor de insignias...',
            'Calentando controles de cola y estado de reproduccion...',
            'Aplicando etiquetas de estado del overlay para OBS...',
            'Endureciendo filtros de moderacion y bloqueo de enlaces...',
          ],
          fr: [
            'Synchronisation de l identite Twitch et du mapping des recompenses...',
            'Construction de la matrice de routage vocal pour les regles TTS...',
            'Chargement du catalogue de voix Azure et des filtres de langue...',
            'Preparation du pipeline de journal live et du resolveur de badges...',
            'Prechauffage des controles de file et de l etat de lecture...',
            'Application des libelles de statut overlay pour OBS...',
            'Renforcement des filtres de moderation et du blocage des liens...',
          ],
        }

        var exitText = {
          en: 'Exit application',
          hu: 'Program bezárása',
          de: 'Anwendung beenden',
          es: 'Cerrar aplicacion',
          fr: 'Quitter application',
        }

        var copyText = {
          en: 'Copy error',
          hu: 'Hiba másolása',
          de: 'Fehler kopieren',
          es: 'Copiar error',
          fr: 'Copier l erreur',
        }

        var textElement = document.getElementById('boot-text')
        var fallbackLine = loadingText[lang] || loadingText.en

        var exitButton = document.getElementById('boot-exit-btn')
        if (exitButton) {
          exitButton.textContent = exitText[lang] || exitText.en
        }

        var copyButton = document.getElementById('boot-copy-btn')
        if (copyButton) {
          copyButton.textContent = '⧉'
          copyButton.setAttribute('aria-label', copyText[lang] || copyText.en)
          copyButton.title = copyText[lang] || copyText.en
        }

        var normalizeCaptionList = function(list) {
          if (!Array.isArray(list)) return []
          return list
            .map(function(entry) { return String(entry || '').trim() })
            .filter(function(entry) { return entry.length > 0 })
        }

        var currentCaptions = normalizeCaptionList(rotatingCaptions[lang] || rotatingCaptions.en)
        var previousIndex = -1

        var pickRandomIndex = function(size, previous) {
          if (size <= 1) return 0

          var next = Math.floor(Math.random() * size)
          if (next === previous) {
            next = (next + 1 + Math.floor(Math.random() * (size - 1))) % size
          }

          return next
        }

        var renderCaption = function() {
          if (!textElement) return

          if (!currentCaptions.length) {
            textElement.textContent = fallbackLine
            return
          }

          var nextIndex = pickRandomIndex(currentCaptions.length, previousIndex)
          previousIndex = nextIndex
          textElement.textContent = currentCaptions[nextIndex]
        }

        var stopRotation = function() {
          if (window.__bootCaptionInterval) {
            window.clearInterval(window.__bootCaptionInterval)
            window.__bootCaptionInterval = null
          }
        }

        var startRotation = function(list) {
          currentCaptions = normalizeCaptionList(list)
          previousIndex = -1
          stopRotation()
          renderCaption()
          window.__bootCaptionInterval = window.setInterval(renderCaption, 2400)
        }

        window.__setBootCaptionList = function(list) {
          var fallbackList = normalizeCaptionList(rotatingCaptions[lang] || rotatingCaptions.en)
          var incoming = normalizeCaptionList(list)
          startRotation(incoming.length ? incoming : fallbackList)
        }

        window.__stopBootCaptionRotation = function() {
          stopRotation()
        }

        window.__triggerBootErrorTest = function(source) {
          var normalized = String(source || 'frontend').trim().toLowerCase()
          var selected = normalized === 'backend' ? 'backend' : 'frontend'

          try {
            window.localStorage.setItem('aether_force_boot_error', selected)
          } catch (error) {
            // ignore storage access failures in test helper
          }

          window.location.reload()
        }

        // Start rotating captions immediately from the first paint.
        startRotation(currentCaptions)
      }())
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
